name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # No custom domain is attached yet (confirmed via the Pages API - cname
      # is null), so this actually serves from
      # https://crossgozon.github.io/maxie-apps-homepage/, not the root.
      # Switch this to "/" only once a custom domain (a CNAME file) is added.
      - run: npm run build
        env:
          VITE_BASE_PATH: /maxie-apps-homepage/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
