name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # www.maxie-apps.online is now attached as a custom domain (public/CNAME),
      # so the site serves from the domain's root, not a GitHub Pages project
      # subpath - revert to /maxie-apps-homepage/ if the custom domain is ever
      # removed and the site falls back to https://crossgozon.github.io/maxie-apps-homepage/.
      - run: npm run build
        env:
          VITE_BASE_PATH: /

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
